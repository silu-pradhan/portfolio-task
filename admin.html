<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <div>
        <p class="sidebar-label">Control Room</p>
        <h1>Portfolio Admin</h1>
        <p class="sidebar-copy">Edit your portfolio content, manage skills and projects, and review messages submitted from the contact form.</p>
      </div>
      <div class="sidebar-actions">
        <a href="index.html" class="btn btn-light">Open Portfolio</a>
        <button id="logoutAdmin" class="btn btn-light" type="button">Logout</button>
        <button id="resetData" class="btn btn-outline" type="button">Reset Demo Data</button>
      </div>
    </aside>

    <main class="admin-main">
      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="panel-label">Profile</p>
            <h2>Hero and contact settings</h2>
          </div>
          <button id="saveProfile" class="btn btn-primary" type="button">Save Profile</button>
        </div>
        <div class="panel-grid">
          <label><span>Name</span><input id="adminName" type="text"></label>
          <label><span>Role Tag</span><input id="adminRole" type="text"></label>
          <label><span>Email</span><input id="adminEmail" type="email"></label>
          <label><span>Phone</span><input id="adminPhone" type="text"></label>
          <label><span>Location</span><input id="adminLocation" type="text"></label>
          <label><span>Experience Label</span><input id="adminExperience" type="text"></label>
          <label class="full"><span>Hero Title</span><textarea id="adminHeroTitle" rows="2"></textarea></label>
          <label class="full"><span>Hero Description</span><textarea id="adminHeroDescription" rows="3"></textarea></label>
          <label class="full"><span>About Heading</span><textarea id="adminAboutHeading" rows="2"></textarea></label>
          <label class="full"><span>About Text</span><textarea id="adminAboutText" rows="4"></textarea></label>
          <label><span>LinkedIn URL</span><input id="adminLinkedIn" type="url"></label>
          <label><span>GitHub URL</span><input id="adminGitHub" type="url"></label>
          <label><span>Behance URL</span><input id="adminBehance" type="url"></label>
        </div>
        <p class="status-text" id="profileStatus"></p>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="panel-label">Projects</p>
            <h2>Manage featured work</h2>
          </div>
          <button id="addProject" class="btn btn-primary" type="button">Add Project</button>
        </div>
        <div id="projectEditor" class="stack-list"></div>
        <div class="panel-foot">
          <button id="saveProjects" class="btn btn-primary" type="button">Save Projects</button>
          <p class="status-text" id="projectsStatus"></p>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="panel-label">Skills</p>
            <h2>Edit the skill collection</h2>
          </div>
          <button id="addSkill" class="btn btn-primary" type="button">Add Skill</button>
        </div>
        <div id="skillEditor" class="stack-list compact"></div>
        <div class="panel-foot">
          <button id="saveSkills" class="btn btn-primary" type="button">Save Skills</button>
          <p class="status-text" id="skillsStatus"></p>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="panel-label">Inbox</p>
            <h2>Messages from the contact form</h2>
          </div>
          <button id="clearMessages" class="btn btn-outline" type="button">Clear Messages</button>
        </div>
        <div id="messageList" class="message-list"></div>
      </section>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
